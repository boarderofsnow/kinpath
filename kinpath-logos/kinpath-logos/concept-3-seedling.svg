<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients for visual depth -->
  <defs>
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b89f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a8975;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8fbc8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a9d7a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Path/ground line -->
  <path d="M 15 85 Q 45 80 75 85"
        stroke="#10b89f"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>

  <!-- Curved stem growing from path -->
  <path d="M 62 85 Q 58 70 65 50 Q 70 35 70 20"
        stroke="url(#stemGradient)"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"/>

  <!-- Left leaf (lower) -->
  <ellipse cx="48" cy="62" rx="8" ry="14"
           fill="url(#leafGradient)"
           transform="rotate(-35 48 62)"/>

  <!-- Right leaf (middle) -->
  <ellipse cx="82" cy="48" rx="8" ry="14"
           fill="url(#leafGradient)"
           transform="rotate(35 82 48)"/>

  <!-- Top leaf (upper) -->
  <ellipse cx="72" cy="28" rx="7" ry="13"
           fill="#8fbc8f"
           transform="rotate(-20 72 28)"/>

  <!-- Small curved detail on bottom leaf -->
  <path d="M 48 50 Q 50 56 52 62"
        stroke="#7a9d7a"
        stroke-width="1"
        fill="none"
        opacity="0.5"/>

  <!-- Small curved detail on middle leaf -->
  <path d="M 82 36 Q 85 42 87 48"
        stroke="#7a9d7a"
        stroke-width="1"
        fill="none"
        opacity="0.5"/>

  <!-- Small curved detail on top leaf -->
  <path d="M 72 16 Q 74 22 75 28"
        stroke="#7a9d7a"
        stroke-width="1"
        fill="none"
        opacity="0.5"/>

  <!-- KinPath Wordmark -->
  <text x="125" y="75"
        font-family="Arial, Helvetica, sans-serif"
        font-size="48"
        font-weight="600"
        fill="#10b89f"
        letter-spacing="-0.5">KinPath</text>

  <!-- Optional subtle descriptor (can be removed if not needed) -->
  <text x="125" y="100"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="#8fbc8f"
        letter-spacing="0.5"
        opacity="0.8">PARENTING PLATFORM</text>
</svg>

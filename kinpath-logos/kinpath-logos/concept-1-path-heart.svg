<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <style>
      .kinpath-wordmark {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 48px;
        font-weight: 600;
        letter-spacing: -1px;
      }
    </style>
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b89f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b89f;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background (optional, remove if transparent is preferred) -->
  <!-- <rect width="400" height="120" fill="#ffffff"/> -->

  <!-- Icon: Winding Path forming a Heart -->
  <g id="path-heart-icon">
    <!-- Outer path that winds and forms the overall heart shape -->
    <!-- Left lobe of heart -->
    <path
      d="M 35 45 Q 25 35 20 25 Q 15 15 25 10 Q 35 5 40 15 Q 42 20 42 30"
      fill="none"
      stroke="url(#pathGradient)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Right lobe of heart -->
    <path
      d="M 65 45 Q 75 35 80 25 Q 85 15 75 10 Q 65 5 60 15 Q 58 20 58 30"
      fill="none"
      stroke="#10b89f"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Main downward path (connecting and descending like a path) -->
    <path
      d="M 42 30 Q 45 35 50 40 Q 52 42 50 45 Q 48 48 45 47 Q 43 46 42 48"
      fill="none"
      stroke="#10b89f"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M 58 30 Q 55 35 50 40 Q 48 42 50 45 Q 52 48 55 47 Q 57 46 58 48"
      fill="none"
      stroke="#10b89f"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Descending winding path (the "path" element) -->
    <path
      d="M 50 48 Q 45 55 48 62 Q 50 68 56 70 Q 62 72 64 66 Q 66 60 62 56"
      fill="none"
      stroke="#8fbc8f"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Bottom path element -->
    <path
      d="M 62 56 Q 60 50 55 48"
      fill="none"
      stroke="#10b89f"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Decorative accent curve (sage green) -->
    <path
      d="M 50 48 Q 52 52 50 56"
      fill="none"
      stroke="#8fbc8f"
      stroke-width="2.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Wordmark: KinPath -->
  <text
    x="115"
    y="75"
    class="kinpath-wordmark"
    fill="#10b89f"
  >KinPath</text>

  <!-- Subtle accent under the wordmark (optional) -->
  <line
    x1="115"
    y1="88"
    x2="285"
    y2="88"
    stroke="#8fbc8f"
    stroke-width="2"
    opacity="0.6"
  />
</svg>
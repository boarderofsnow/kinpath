<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <style>
      .kinpath-text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 48px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }
      .kinpath-text-primary {
        fill: #10b89f;
      }
      .kinpath-text-accent {
        fill: #f59e0b;
      }
    </style>

    <!-- Subtle gradient for the circles -->
    <linearGradient id="parentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b89f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f9984;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="childGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Parent circle (larger, teal) -->
  <circle cx="35" cy="50" r="32" fill="url(#parentGradient)" opacity="0.95"/>

  <!-- Child circle (smaller, positioned to overlap) -->
  <circle cx="65" cy="65" r="22" fill="url(#childGradient)" opacity="0.9"/>

  <!-- Connection path (subtle line suggesting link) -->
  <g stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Curved path element connecting the circles -->
    <path d="M 50 45 Q 65 50, 70 58" opacity="0.7"/>
  </g>

  <!-- Accent overlay in overlap area for visual interest -->
  <circle cx="60" cy="60" r="8" fill="#f59e0b" opacity="0.3"/>

  <!-- Wordmark: "KinPath" -->
  <text x="115" y="70" class="kinpath-text kinpath-text-primary">Kin</text><text x="175" y="70" class="kinpath-text kinpath-text-accent">Path</text>

  <!-- Optional: subtle underline accent -->
  <line x1="115" y1="80" x2="260" y2="80" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
</svg>
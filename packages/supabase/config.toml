project_id = "kinpath"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["kinpath://auth-callback", "https://kinpath.family/api/auth/callback"]
jwt_expiry = 3600

[auth.email.template.confirmation]
subject = "Confirm Your Email"
content_path = "./supabase/email-templates/confirm-signup.html"

[auth.email.template.recovery]
subject = "Reset Your Password"
content_path = "./supabase/email-templates/reset-password.html"

[auth.email.template.invite]
subject = "You've Been Invited to Kinpath"
content_path = "./supabase/email-templates/invite-user.html"

[auth.email.template.magic_link]
subject = "Your Login Link"
content_path = "./supabase/email-templates/magic-link.html"

[auth.email.template.email_change]
subject = "Confirm Your New Email"
content_path = "./supabase/email-templates/change-email.html"

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"

[storage]
enabled = true
file_size_limit = "50MiB"
